<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Audio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --card: #1f1f28;
    --accent: #c8a96e;
    --text: #e8e4dc;
    --muted: #7a7870;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.07);
    padding: 40px 36px;
    width: 100%;
    max-width: 520px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }

  input[type=password] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  input[type=password]:focus { border-color: var(--accent); }

  button {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #b8923e);
    color: #1a1200;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  button:hover:not(:disabled) { opacity: 0.9; transform: scale(1.01); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .progress-wrap {
    margin-top: 24px;
    display: none;
  }
  .progress-label {
    font-size: 12px; color: var(--muted);
    display: flex; justify-content: space-between;
    margin-bottom: 8px;
  }
  .progress-track {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #7c9eb2);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .status {
    font-size: 13px; color: var(--muted);
    margin-top: 10px; text-align: center;
    min-height: 20px;
  }
  .error { color: #e07070; }

  .download-wrap {
    margin-top: 24px;
    display: none;
    text-align: center;
  }
  .download-btn {
    display: inline-block;
    background: rgba(109,191,126,0.15);
    color: #6dbf7e;
    border: 1px solid rgba(109,191,126,0.3);
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }
  .download-btn:hover { background: rgba(109,191,126,0.25); }
  .download-note { font-size: 11px; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>
<div class="card">
  <h1>🎙 Generate Audio</h1>
  <p class="sub">
    Generates the full article as a single MP3 using OpenAI TTS.<br>
    Voice: <strong style="color:var(--accent)">Nova</strong> · Speed: <strong style="color:var(--accent)">1×</strong>
  </p>

  <label>OpenAI API Key</label>
  <input type="password" id="keyInput" placeholder="sk-proj-..." autocomplete="off" />

  <button id="generateBtn" onclick="generate()">Generate MP3</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">Generating…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status" id="statusText"></div>
  </div>

  <div class="download-wrap" id="downloadWrap">
    <a id="downloadLink" class="download-btn" download="how-to-stop-ruminating.mp3">⬇ Download MP3</a>
    <div class="download-note">Open in any audio player or upload to YouTube directly.</div>
  </div>
</div>

<script>
// Full article as chunks — OpenAI TTS max input is 4096 chars, so we split into sections
const chunks = [
  `Please note: Rumination-Focused ERP is a new and evolving approach. Neither this exercise nor the rest of the treatment has been researched, and therefore neither is evidence-based. This article describes the exercise used to teach people how to stop ruminating.

The exercise starts with the following instructions. Don't ruminate. If there is a problem that you usually ruminate about, your job is to not try to solve that problem. Don't try to push it out of your mind or forget about it. Don't actively try to keep it in mind either. It can be there or not be there — it doesn't matter. Your job is to not try to solve it.`,

  `How do you know if it worked? There are two questions used to make sure a person has completely stopped ruminating.

The first question is: What is your anxiety level, from zero to ten? Anxiety is believed to be a product of rumination. Therefore, if a person has fully stopped ruminating, their anxiety level will be close to zero. While it might not be exactly zero, it shouldn't be much higher. If it's significantly higher than zero, they are still engaging in some way.

This is essentially a multiple choice test. Here's what they might be doing: one — trying to figure something out, also called rumination proper; two — directing attention or monitoring; three — keeping their guard up; four — pushing away thoughts, trying not to let thoughts enter awareness; five — using mindfulness or bad distraction; six — engaging in self-talk.

A person might be doing a combination of several of these, and it may therefore be necessary to repeat this exercise several times, identifying issues one by one until the anxiety level comes down to about zero.`,

  `But even if anxiety is close to zero, it's important to ask one more question: Did that feel totally easy? How much of an effort were you making, from zero to ten?

Remember that ruminating is doing something, and not ruminating is not doing it. If someone says they're not ruminating but it requires effort, that tells us that they are doing something, which indicates a flaw in their approach. Not ruminating needs to feel like getting off of a treadmill, not getting onto one. The experience of not ruminating should feel as effortless as lying on your sofa.

When not ruminating feels easy and requires no effort, the exercise is working. All we mean is that when you're not ruminating, it shouldn't feel like you're making an effort.`,

  `Now let's take a closer look at each of the multiple choice answers.

Number one: Trying to figure something out — rumination proper. This is pretty self-explanatory. Just keep in mind that this includes not only trying to solve the original problem, but also trying to solve another problem; trying to figure out if you're doing it right; trying to figure out if you'll be able to do it outside of the session; and so on. Analytical thinking of all kinds is controllable. Just like you can stop solving a math problem or planning a party, you can stop ruminating.

Number two: Directing attention or monitoring. This includes someone who is directing attention towards the problem even if they aren't really analyzing it; someone who is directing attention towards their thoughts to see if they're ruminating; and someone who is directing attention towards an emotion or a feeling in their body. People often think that in order to stop directing attention towards one thing, they have to direct it towards something else. These people need to be told: directing attention is like mentally holding onto something. You don't need to grab onto something else — just let go.`,

  `Number three: Keeping your guard up. This is like bracing yourself mentally — sort of like directing attention towards the general possibility of threat, or like a mental radar. Once someone realizes they're doing this, they can typically stop.

Sometimes a person is bracing themselves against rumination. Such a person needs to understand that rumination isn't something that happens to them; it's something they do. And as long as they don't do it, it won't happen. Metaphorically, they are leaning up against a locked door. You can let go.

Number four: Pushing away thoughts — trying not to let thoughts enter awareness. It's crucial to distinguish between something being in awareness and directing attention towards it. The former is not controllable, and trying to control it will backfire — because in the process of trying to keep something out of awareness, you are directing attention towards it, which keeps it in awareness. The latter is controllable. Even if a problem remains in awareness, if a person completely lets go of trying to solve it and of directing attention towards it, their anxiety will still come down to about zero. The language used most frequently in these cases is: it's there — don't engage.`,

  `Number five: Using mindfulness or bad distraction. Many people who struggle with rumination have tried to use mindfulness or distraction to solve this problem. Evidently these strategies haven't worked or they wouldn't be seeking help.

Distraction is bad if it is an attempt to push something out of awareness, or an attempt to stop paying attention to one thing by paying attention to something else. You can't force something out of awareness — trying to force it out will actually keep it in awareness. And you don't need to direct your attention towards one thing to stop directing it towards another. You can just let go.

Number six: Engaging in self-talk. Whether you talk to yourself out loud or just in your head, everyone engages in self-talk sometimes. But in the context of not ruminating, the problem with self-talk is twofold: first, it keeps you engaged with the problem; second, it is doing something — and we want people to understand that not ruminating is about not doing something. Fortunately, not talking in your head is as easy as not talking out loud.`,

  `Let's look at some things people commonly say during this exercise, and what to tell them.

"I keep trying to think about other things but it's still there." Your job isn't to make it go away. Your job is to let it be there without directing attention towards it or trying to solve it. You also don't need to actively distract yourself. Just let it be there, and don't engage.

"I keep trying to stay present and mindful but my mind keeps wandering." You don't need to be mindful or present. You can think about whatever you want, or let your mind wander. Your only job is not to solve that problem or direct your attention towards it. Ruminating is like trying to solve a math problem. If I asked you to stop solving a math problem, you wouldn't need to do mindfulness — you would just stop.

"I don't know what to do instead." You can do literally anything. I'm asking you to get off of the treadmill, and you're asking me what to do instead. My answer is: do anything you want, as long as you stay off the treadmill.`,

  `"It keeps popping into my mind." Popping in? You must be trying to push it out. Your job isn't to get rid of it — it's to stop directing attention towards it. Just let it be there and don't engage. It also sounds like you might be watching the door to see who comes in. Try to let go of doing that.

"I keep thinking about whether I'm going to be able to keep this up" or "I keep worrying that I'm not doing this right." Trying to figure that out is also rumination. If the thought occurs to you that you might not be able to keep this up, treat that the same as the original problem: don't engage with it.

"Now I'm just worrying about something else." The point of this exercise is that you can choose what you think about. Thoughts occur to you, but you decide if you want to engage with them or not. The same way that you're choosing not to engage with the original problem, you can choose not to engage with these other ones.

"I'm really not trying to figure it out but I'm still anxious about it." This person is most likely still directing attention. Even though you're not trying to solve it, you might still be directing your attention towards it. Directing attention is also controllable. Try to let it be there and just not engage.`,

  `"I feel sad" — or any other emotion. Feeling emotional doesn't indicate rumination. We would want to convey that the feeling itself is not a problem, but directing attention towards it and ruminating about it are. The guidance is: that's okay — I'm not asking you to control your feelings, just your thoughts. You can feel whatever comes up. Just make sure you're not directing attention towards the feeling or trying to figure anything out about it. Let yourself feel whatever you feel, but don't engage with it mentally.

In conclusion: knowing how to stop ruminating is not only foundational to the treatment of OCD and other anxiety disorders, but also a basic life skill that every person should be taught. We humans don't realize how much control we have over certain parts of what goes on in our minds, or where the line is between what we can and can't control. Finding out can be life-changing.`
];

async function generate() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key.startsWith('sk-')) {
    alert('Please enter a valid OpenAI API key (starts with sk-)');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  const progressWrap = document.getElementById('progressWrap');
  const downloadWrap = document.getElementById('downloadWrap');
  progressWrap.style.display = 'block';
  downloadWrap.style.display = 'none';

  const audioBlobs = [];

  for (let i = 0; i < chunks.length; i++) {
    const pct = Math.round((i / chunks.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressLabel').textContent = `Generating part ${i + 1} of ${chunks.length}…`;
    document.getElementById('statusText').textContent = chunks[i].substring(0, 60) + '…';

    try {
      const resp = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'tts-1',
          voice: 'nova',
          input: chunks[i],
          speed: 1.0
        })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${resp.status}`);
      }

      const blob = await resp.blob();
      audioBlobs.push(blob);

    } catch(e) {
      document.getElementById('statusText').innerHTML = `<span class="error">Error on part ${i+1}: ${e.message}</span>`;
      btn.disabled = false;
      btn.textContent = 'Retry';
      return;
    }
  }

  // Combine all blobs into one MP3 file
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('progressLabel').textContent = 'Done!';
  document.getElementById('statusText').textContent = 'Combining audio parts…';

  const combined = new Blob(audioBlobs, { type: 'audio/mpeg' });
  const url = URL.createObjectURL(combined);

  document.getElementById('downloadLink').href = url;
  downloadWrap.style.display = 'block';
  document.getElementById('statusText').textContent = '';

  btn.disabled = false;
  btn.textContent = 'Regenerate';
}
</script>
</body>
</html>
